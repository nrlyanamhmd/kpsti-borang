<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <meta name="theme-color" content="#1a3a6b"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="KPSTI Borang"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <title>Borang Meninggalkan Pejabat – KPSTI</title>
  <style>
    :root {
      --navy: #1a3a6b;
      --navy-dark: #0f2550;
      --gold: #ffd700;
      --green: #28a745;
      --red: #dc3545;
      --grey-bg: #f4f6fb;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { font-family:Arial,sans-serif; background:var(--grey-bg); min-height:100vh; }

    /* ── TOP BAR ── */
    .topbar {
      background:var(--navy); color:white;
      padding:0 16px; height:56px;
      display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:100;
      box-shadow:0 2px 8px rgba(0,0,0,.3);
    }
    .topbar-left { display:flex; align-items:center; gap:10px; }
    .topbar h1 { font-size:15px; line-height:1.2; }
    .topbar p  { font-size:10px; opacity:.7; }

    /* ── INSTALL BANNER ── */
    #installBanner {
      display:none; background:#fff3cd; border-bottom:2px solid var(--gold);
      padding:10px 16px; align-items:center; justify-content:space-between; gap:10px;
    }
    #installBanner.show { display:flex; }
    #installBanner span { font-size:12px; color:#856404; flex:1; }
    .btn-install {
      background:var(--navy); color:white; border:none;
      padding:7px 14px; border-radius:5px; font-size:12px;
      cursor:pointer; white-space:nowrap; font-weight:bold;
    }
    .btn-dismiss { background:none; border:none; font-size:18px; cursor:pointer; color:#856404; padding:0 4px; }

    /* ── SCROLL CONTENT ── */
    .content { padding:16px; max-width:600px; margin:0 auto; }

    /* ── SECTION CARD ── */
    .card {
      background:white; border-radius:10px;
      box-shadow:0 1px 6px rgba(0,0,0,.08);
      margin-bottom:14px; overflow:hidden;
    }
    .card-header {
      background:var(--navy); color:white;
      padding:10px 14px; font-size:12px;
      font-weight:bold; text-transform:uppercase; letter-spacing:0.5px;
    }
    .card-body { padding:14px; }

    /* ── FORM FIELDS ── */
    .field { margin-bottom:12px; }
    .field label { display:block; font-size:11px; color:#666; font-weight:bold; margin-bottom:4px; text-transform:uppercase; letter-spacing:0.3px; }
    .field input, .field select {
      width:100%; border:1.5px solid #ddd; border-radius:7px;
      padding:11px 13px; font-size:14px; outline:none;
      font-family:Arial,sans-serif; background:white;
      transition:border-color .2s;
    }
    .field input:focus, .field select:focus { border-color:var(--navy); }
    .field input.required-err { border-color:var(--red); }

    .field-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

    /* ── RADIO GROUP ── */
    .radio-group { display:flex; gap:16px; flex-wrap:wrap; margin-top:4px; }
    .radio-item { display:flex; align-items:center; gap:6px; cursor:pointer; }
    .radio-item input[type=radio] { width:18px; height:18px; accent-color:var(--navy); cursor:pointer; }
    .radio-item span { font-size:14px; }

    /* ── ROMBONGAN TABLE ── */
    .romb-table { width:100%; border-collapse:collapse; font-size:12px; }
    .romb-table th { background:#f0f4ff; padding:7px 8px; text-align:left; font-size:11px; color:var(--navy); border-bottom:2px solid #ddd; }
    .romb-table td { padding:5px 4px; border-bottom:1px solid #f0f0f0; }
    .romb-table td:first-child { width:28px; text-align:center; color:#888; font-size:11px; }
    .romb-table input { border:1px solid #ddd; border-radius:5px; padding:6px 8px; font-size:12px; width:100%; outline:none; }
    .romb-table input:focus { border-color:var(--navy); }

    /* ── SUBMIT ── */
    .btn-submit {
      width:100%; background:var(--navy); color:white; border:none;
      padding:15px; font-size:16px; border-radius:10px;
      cursor:pointer; font-weight:bold; font-family:Arial,sans-serif;
      margin-top:4px; letter-spacing:0.3px;
      box-shadow:0 4px 12px rgba(26,58,107,.3);
      transition:background .2s, transform .1s;
    }
    .btn-submit:active { transform:scale(.98); }
    .btn-submit:hover  { background:var(--navy-dark); }
    .btn-submit:disabled { background:#888; cursor:not-allowed; box-shadow:none; }

    /* ── STATUS MESSAGE ── */
    .status-msg {
      border-radius:8px; padding:13px 16px;
      font-size:13px; font-weight:bold;
      margin-top:12px; display:none; text-align:center;
    }
    .status-msg.show { display:block; }
    .status-msg.ok   { background:#d1e7dd; color:#0a5233; }
    .status-msg.err  { background:#f8d7da; color:#842029; }

    /* ── DIVIDER ── */
    .divider {
      display:flex; align-items:center; gap:10px;
      font-size:11px; color:#aaa; margin:4px 0 12px;
    }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:#eee; }

    /* ── SAFE AREA (notch phones) ── */
    .safe-bottom { height:env(safe-area-inset-bottom, 16px); }
  </style>
</head>
<body>

<!-- INSTALL BANNER -->
<div id="installBanner">
  <span>📲 Install app ini di homescreen untuk akses lebih mudah!</span>
  <button class="btn-install" id="btnInstall">Install</button>
  <button class="btn-dismiss" onclick="document.getElementById('installBanner').classList.remove('show')">✕</button>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <div style="width:36px;height:36px;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;">🏛️</div>
    <div>
      <h1>KPSTI</h1>
      <p>Borang Meninggalkan Pejabat</p>
    </div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="content">

  <!-- MAKLUMAT PEMOHON -->
  <div class="card">
    <div class="card-header">📋 Maklumat Pemohon</div>
    <div class="card-body">
      <div class="field">
        <label>Nama Penuh Pemohon *</label>
        <input type="text" id="namaPemohon" placeholder="cth: Nur Lyana binti Mahmud" autocomplete="name"/>
      </div>
      <div class="field">
        <label>Jawatan / Gred *</label>
        <input type="text" id="jawatanGred" placeholder="cth: Pembantu Tadbir Gred N1"/>
      </div>
      <div class="field">
        <label>Bahagian *</label>
        <input type="text" id="bahagian" placeholder="cth: Inovasi dan Tadbir"/>
      </div>
      <div class="field">
        <label>No Telefon *</label>
        <input type="tel" id="noTelefon" placeholder="cth: 0107109836" autocomplete="tel"/>
      </div>
    </div>
  </div>

  <!-- MAKLUMAT PERJALANAN -->
  <div class="card">
    <div class="card-header">✈️ Maklumat Perjalanan</div>
    <div class="card-body">
      <div class="field">
        <label>Tujuan Program / Urusan *</label>
        <input type="text" id="tujuan" placeholder="cth: PROGRAM KRE8TIF EAST SABAH 2026"/>
      </div>
      <div class="field">
        <label>Tempat Dituju *</label>
        <input type="text" id="tempatDituju" placeholder="cth: Hotel 7 Suria"/>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Tarikh Bertolak</label>
          <input type="date" id="tarikhBertolak"/>
        </div>
        <div class="field">
          <label>Masa Bertolak</label>
          <input type="time" id="masaBertolak"/>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Tarikh Kembali</label>
          <input type="date" id="tarikhKembali"/>
        </div>
        <div class="field">
          <label>Masa Kembali</label>
          <input type="time" id="masaKembali"/>
        </div>
      </div>
      <div class="field">
        <label>Memerlukan Pengangkutan?</label>
        <div class="radio-group">
          <label class="radio-item"><input type="radio" name="pengangkutan" value="Ya"/><span>Ya</span></label>
          <label class="radio-item"><input type="radio" name="pengangkutan" value="Tidak"/><span>Tidak</span></label>
        </div>
      </div>
      <div class="field" id="jenisField" style="display:none">
        <label>Jenis Pengangkutan</label>
        <div class="radio-group">
          <label class="radio-item"><input type="radio" name="jenisAngkut" value="Darat"/><span>🚗 Darat</span></label>
          <label class="radio-item"><input type="radio" name="jenisAngkut" value="Udara"/><span>✈️ Udara</span></label>
        </div>
      </div>
    </div>
  </div>

  <!-- AHLI ROMBONGAN -->
  <div class="card">
    <div class="card-header">👥 Ahli-Ahli Rombongan (Jika Ada)</div>
    <div class="card-body" style="padding:10px">
      <table class="romb-table">
        <thead><tr><th>#</th><th>Nama</th><th>Jawatan</th><th>Gred</th></tr></thead>
        <tbody id="rombonganRows">
          <tr><td>1</td><td><input type="text" placeholder="Nama" class="rn"/></td><td><input type="text" placeholder="Jawatan" class="rj"/></td><td><input type="text" placeholder="Gred" class="rg" style="width:60px"/></td></tr>
          <tr><td>2</td><td><input type="text" placeholder="Nama" class="rn"/></td><td><input type="text" placeholder="Jawatan" class="rj"/></td><td><input type="text" placeholder="Gred" class="rg" style="width:60px"/></td></tr>
          <tr><td>3</td><td><input type="text" placeholder="Nama" class="rn"/></td><td><input type="text" placeholder="Jawatan" class="rj"/></td><td><input type="text" placeholder="Gred" class="rg" style="width:60px"/></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- TARIKH -->
  <div class="card">
    <div class="card-header">📅 Tarikh Permohonan</div>
    <div class="card-body">
      <div class="field">
        <label>Tarikh Tandatangan</label>
        <input type="date" id="tarikhTandatangan"/>
      </div>
    </div>
  </div>

  <!-- SUBMIT -->
  <button class="btn-submit" id="btnSubmit" onclick="submitForm()">
    📤 Hantar Borang ke Admin
  </button>
  <div class="status-msg" id="statusMsg"></div>
  <div class="safe-bottom"></div>

</div><!-- end content -->

<script>
  // ── SUPABASE ──
  const SUPA_URL = 'https://zmnjzswrjwxudmnzkggm.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inptbmp6c3dyand4dWRtbnprZ2dtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NjU0ODAsImV4cCI6MjA5NjU0MTQ4MH0.g_ccnNLI-CmPvE8BYk8dnu14yNvFq9DEfN37e_3D23E';
  const TABLE    = 'borang_meninggalkan_pejabat';

  // ── SERVICE WORKER ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(console.error);
  }

  // ── PWA INSTALL ──
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').classList.add('show');
  });

  document.getElementById('btnInstall').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') document.getElementById('installBanner').classList.remove('show');
    deferredPrompt = null;
  });

  // ── SHOW/HIDE JENIS PENGANGKUTAN ──
  document.querySelectorAll('input[name="pengangkutan"]').forEach(r =>
    r.addEventListener('change', () => {
      document.getElementById('jenisField').style.display =
        r.value === 'Ya' && r.checked ? 'block' : 'none';
    })
  );

  // ── DEFAULT DATE ──
  document.getElementById('tarikhTandatangan').value = new Date().toISOString().split('T')[0];

  // ── HELPERS ──
  function dv(id){ return document.getElementById(id).value.trim()||null; }

  function getRombongan(){
    return [...document.querySelectorAll('#rombonganRows tr')].reduce((a,row,i)=>{
      const nama=row.querySelector('.rn').value.trim();
      const jaw =row.querySelector('.rj').value.trim();
      const gred=row.querySelector('.rg').value.trim();
      if(nama||jaw||gred) a.push({bil:i+1,nama,jawatan:jaw,gred});
      return a;
    },[]);
  }

  // ── SUBMIT ──
  async function submitForm(){
    const btn = document.getElementById('btnSubmit');
    const msg = document.getElementById('statusMsg');

    // Validate
    const required = ['namaPemohon','jawatanGred','bahagian','noTelefon','tujuan','tempatDituju'];
    let ok = true;
    required.forEach(id => {
      const el = document.getElementById(id);
      if (!el.value.trim()) { el.classList.add('required-err'); ok=false; }
      else el.classList.remove('required-err');
    });

    if (!ok) {
      msg.textContent = '⚠️ Sila lengkapkan semua medan bertanda *';
      msg.className = 'status-msg show err';
      msg.scrollIntoView({behavior:'smooth', block:'center'});
      return;
    }

    const payload = {
      tarikh_dokumen:          new Date().toISOString().split('T')[0],
      nama_pemohon:            document.getElementById('namaPemohon').value.trim(),
      jawatan_gred:            document.getElementById('jawatanGred').value.trim(),
      bahagian:                document.getElementById('bahagian').value.trim(),
      tempat_dituju:           document.getElementById('tempatDituju').value.trim(),
      memerlukan_pengangkutan: document.querySelector('input[name="pengangkutan"]:checked')?.value||null,
      jenis_pengangkutan:      document.querySelector('input[name="jenisAngkut"]:checked')?.value||null,
      tujuan:                  document.getElementById('tujuan').value.trim(),
      no_telefon:              document.getElementById('noTelefon').value.trim(),
      tarikh_bertolak:         dv('tarikhBertolak'),
      masa_bertolak:           document.getElementById('masaBertolak').value||null,
      tarikh_kembali:          dv('tarikhKembali'),
      masa_kembali:            document.getElementById('masaKembali').value||null,
      tarikh_tandatangan:      dv('tarikhTandatangan'),
      ahli_rombongan:          getRombongan(),
      status:                  'pending'
    };

    btn.disabled=true; btn.textContent='⏳ Menghantar...';
    msg.className='status-msg'; msg.textContent='';

    try {
      const res = await fetch(`${SUPA_URL}/rest/v1/${TABLE}`, {
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'apikey': SUPA_KEY,
          'Authorization': 'Bearer '+SUPA_KEY,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify(payload)
      });

      if (res.ok) {
        msg.textContent = '✅ Borang berjaya dihantar! Admin akan menerima dan mencetak borang anda.';
        msg.className   = 'status-msg show ok';
        // Reset form
        document.querySelectorAll('input[type=text],input[type=tel]').forEach(i=>i.value='');
        document.querySelectorAll('input[type=radio]').forEach(i=>i.checked=false);
        document.querySelectorAll('input[type=date]').forEach(i=>i.value='');
        document.querySelectorAll('input[type=time]').forEach(i=>i.value='');
        document.getElementById('tarikhTandatangan').value = new Date().toISOString().split('T')[0];
        document.getElementById('jenisField').style.display='none';
      } else {
        const err = await res.text();
        msg.textContent = '❌ Ralat: ' + err;
        msg.className   = 'status-msg show err';
      }
    } catch(err) {
      msg.textContent = '❌ Tiada sambungan internet. Sila cuba lagi.';
      msg.className   = 'status-msg show err';
    }

    btn.disabled=false; btn.textContent='📤 Hantar Borang ke Admin';
    msg.scrollIntoView({behavior:'smooth', block:'center'});
  }
</script>
</body>
</html>
